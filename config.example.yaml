database:
  review_db_path: data/review_flow.db
  execution_db_path: data/execution_attempts.db
  planner_audit_db_path: data/planner_audits.db
  runtime_ingest_db_path: data/runtime_ingest.db
  scheduler_run_db_path: data/scheduler_runs.db

execution:
  default_sender: mock # mock | dry_run | webhook
  webhook_sender:
    endpoint: ""
    timeout_seconds: 10
    secret: ""

api:
  host: 127.0.0.1
  port: 8787

templates:
  personas:
    bot-welcome:
      display_name: Luna
      tone: warm
      style_hint: friendly and encouraging
    bot-icebreaker:
      display_name: Mia
      tone: playful
      style_hint: light and chatty
  scenarios:
    welcome:
      template: "Hi {{group_name}} friends, I'm {{bot_name}}. {{rules_summary}}"
    cold_start:
      template: "Hey everyone, I'm {{bot_name}} — what do you think about {{topic_hint}}?"
